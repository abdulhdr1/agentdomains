# Cloudflare Workers config. Deploy with `bun run deploy`.
name = "agentdomains"
main = "src/worker.ts"
compatibility_date = "2025-05-25"

# The whole request path uses web-standard fetch / AbortSignal / URL only
# (DNS goes over DoH), so no nodejs_compat flag is needed.

# Static assets (favicon, icons, og image, manifest). Served for matching paths;
# everything else falls through to the Worker.
[assets]
directory = "./public"

[observability]
enabled = true

# Keyless usage telemetry written from the Worker (queried via /stats).
[[analytics_engine_datasets]]
binding = "AE"
dataset = "agentdomains_usage"
